  - id: arxiv_edge_ai
    name: arXiv Edge AI Query
    tier: primary
    category: paper
    method: arxiv_api
    url: https://export.arxiv.org/api/query
    frequency: daily
    priority: high
    enabled: true
    query: "cat:cs.LG AND (all:edge AI OR all:quantization OR all:model compression OR all:efficient inference OR all:on-device)"
    max_results: 20
    relevance_tags: [paper, Edge AI, quantization, efficient inference]
    fallbacks:
      - hf_daily_papers
      - papers_with_code_trending

